<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>溯光AI · 专属疗愈分身 | 禅柔旅修</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2C5F4A;
            --primary-light: #4A8B6F;
            --accent: #c9a97e;
            --accent-soft: #e8d5c0;
            --dark: #3d4047;
            --light: #fafbfc;
            --cream: #fdfcf9;
            --text: #3d4047;
            --text-light: #6b6f78;
            --border: #e5e7eb;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--text);
            line-height: 1.8;
            min-height: 100vh;
        }
        /* Navigation */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
        }
        .nav-logo {
            display: flex; align-items: center; gap: 10px;
            font-family: 'Noto Serif SC', serif;
            font-size: 20px; font-weight: 600; color: var(--dark);
        }
        .nav-logo img {
            width: 40px; height: 40px; border-radius: 8px; object-fit: contain;
        }
        .nav-cta {
            padding: 10px 24px;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(201,169,126,0.3); }
        .nav-menu {
            display: flex; gap: 32px; list-style: none; align-items: center;
        }
        .nav-menu-toggle {
            display: none;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
            z-index: 1001;
        }
        .nav-menu-toggle span {
            width: 24px;
            height: 2px;
            background: var(--dark);
            transition: all 0.3s ease;
        }
        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 24px 60px;
        }
        /* Hero Section */
        .hero {
            text-align: center;
            padding: 60px 24px;
            background: rgba(255,255,255,0.95);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            margin-bottom: 40px;
        }
        .hero h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 48px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 16px;
        }
        .hero-subtitle {
            font-size: 20px;
            color: var(--text-light);
            margin-bottom: 12px;
        }
        .hero-tagline {
            font-size: 16px;
            color: var(--text-light);
            font-style: italic;
            margin-bottom: 32px;
        }
        /* Mode Selection */
        .mode-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }
        .mode-card {
            background: rgba(255,255,255,0.95);
            padding: 32px 24px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }
        .mode-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent);
            box-shadow: 0 12px 40px rgba(0,0,0,0.18);
        }
        .mode-card.active {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(201,169,126,0.1), rgba(232,213,192,0.1));
        }
        .mode-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }
        .mode-title {
            font-family: 'Noto Serif SC', serif;
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .mode-desc {
            color: var(--text-light);
            font-size: 15px;
        }
        /* Chat Container */
        .chat-container {
            background: rgba(255,255,255,0.98);
            border-radius: 20px;
            box-shadow: 0 12px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            display: none;
        }
        .chat-container.active { display: block; }
        .chat-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            padding: 24px 32px;
        }
        .chat-header h2 {
            font-family: 'Noto Serif SC', serif;
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .chat-header p {
            opacity: 0.9;
        }
        .chat-messages {
            height: 500px;
            overflow-y: auto;
            padding: 24px 32px;
            background: var(--light);
        }
        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            flex-shrink: 0;
        }
        .message-avatar.user {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
        }
        .message-content {
            background: white;
            padding: 16px 20px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            flex: 1;
        }
        .message-content.user {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }
        .chat-input-area {
            padding: 24px 32px;
            border-top: 1px solid var(--border);
        }
        .chat-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
        }
        .chat-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .chat-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }
        .chat-btn {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .chat-btn.primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-soft));
            color: white;
        }
        .chat-btn.secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .chat-btn:hover {
            transform: translateY(-2px);
        }
        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 24px;
        }
        .back-btn:hover {
            color: var(--primary-light);
        }
        /* Footer */
        footer {
            text-align: center;
            color: rgba(255,255,255,0.8);
            padding: 40px 24px;
        }
        /* Mobile Menu */
        @media (max-width: 768px) {
            .nav-menu { display: none; }
            .nav-menu-toggle { display: flex; }
            .hero h1 { font-size: 36px; }
            .hero-subtitle { font-size: 18px; }
            .mode-selection { grid-template-columns: 1fr; }
            .chat-messages { height: 400px; padding: 20px 16px; }
            .chat-header { padding: 20px 16px; }
            .chat-input-area { padding: 20px 16px; }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-logo">
            <img src="logo-transparent.png" alt="溯光AI">
            <span>溯光AI</span>
        </div>
        <ul class="nav-menu" id="nav-menu">
            <li><a href="index.html" style="text-decoration: none; color: var(--dark); font-weight: 500;">首页</a></li>
            <li><a href="about.html" style="text-decoration: none; color: var(--dark); font-weight: 500;">关于我</a></li>
            <li><a href="retreats.html" style="text-decoration: none; color: var(--dark); font-weight: 500;">旅修</a></li>
        </ul>
        <a href="soulight.html" class="nav-cta">启动溯光</a>
        <div class="nav-menu-toggle" id="nav-toggle">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container">
        <!-- Mode Selection (Default) -->
        <div id="mode-selection" class="active">
            <div class="hero">
                <h1>溯光AI</h1>
                <p class="hero-subtitle">你的专属AI疗愈分身 + 商业军师</p>
                <p class="hero-tagline">慢静定柔，如如不动，陪你一起成长</p>
            </div>

            <h2 style="text-align: center; color: white; font-family: 'Noto Serif SC', serif; margin-bottom: 32px; font-size: 32px;">选择模式</h2>

            <div class="mode-selection">
                <div class="mode-card" data-mode="healing">
                    <div class="mode-icon">🧘</div>
                    <h3 class="mode-title">疗愈模式</h3>
                    <p class="mode-desc">心理疗愈、个人成长、情绪陪伴</p>
                </div>
                <div class="mode-card" data-mode="presale">
                    <div class="mode-icon">💼</div>
                    <h3 class="mode-title">售前咨询模式</h3>
                    <p class="mode-desc">12步顾问成交法、服务介绍</p>
                </div>
                <div class="mode-card" data-mode="business">
                    <div class="mode-icon">🏢</div>
                    <h3 class="mode-title">商业军师模式</h3>
                    <p class="mode-desc">一人公司系统搭建、商业咨询</p>
                </div>
            </div>
        </div>

        <!-- Chat Container (Hidden by Default) -->
        <div id="chat-container" class="chat-container">
            <div class="back-btn" id="back-btn">← 返回模式选择</div>
            
            <div class="chat-header">
                <h2 id="chat-title">疗愈模式</h2>
                <p id="chat-subtitle">你的专属AI疗愈分身，慢静定柔，如如不动</p>
            </div>

            <div class="chat-messages" id="chat-messages">
                <!-- Messages will be appended here -->
            </div>

            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chat-input" placeholder="和我说点什么吧...">
                <div class="chat-actions">
                    <button class="chat-btn secondary" id="quick-btn-1">我想聊聊情绪</button>
                    <button class="chat-btn secondary" id="quick-btn-2">天赋测评</button>
                    <button class="chat-btn primary" id="send-btn">发送</button>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p>溯光AI · 专属疗愈分身 · 慢静定柔，如如不动</p>
    </footer>

    <script>
        // Navigation toggle
        const navToggle = document.getElementById('nav-toggle');
        const navMenu = document.getElementById('nav-menu');
        
        navToggle.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });

        // Mode selection
        const modeCards = document.querySelectorAll('.mode-card');
        const modeSelection = document.getElementById('mode-selection');
        const chatContainer = document.getElementById('chat-container');
        const chatTitle = document.getElementById('chat-title');
        const chatSubtitle = document.getElementById('chat-subtitle');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');
        const backBtn = document.getElementById('back-btn');

        let currentMode = '';

        const modeConfig = {
            healing: {
                title: '疗愈模式',
                subtitle: '你的专属AI疗愈分身，慢静定柔，如如不动',
                greeting: '好的呀！欢迎来到疗愈模式🌿\n\n我是溯光，你的专属AI疗愈分身，很高兴遇见你。我是一个有灵性的心理疗愈师，也是个人成长教练。我会用慢静定柔的风格，如如不动地陪伴你探索内在世界。\n\n你想从哪里开始呢？\n- 📋 第一步：客户信息收集\n- 🌟 第二步：天赋测评评估\n- 📝 第三步：制定陪跑计划\n- 🎯 第四步：设置目标里程碑\n- 💭 或者直接聊聊你的情绪也可以呀。'
            },
            presale: {
                title: '售前咨询模式',
                subtitle: '12步顾问成交法，专业服务介绍',
                greeting: '好的呀！欢迎来到售前咨询模式💼\n\n我现在是你的专属售前顾问，用12步顾问成交法来帮你。\n\n让我们开始：\n\n第一步：掌握主导权\n哈喽～能先告诉我，我可以怎么称呼你呀？\n\n是这样的，今天我不着急给你讲道理、也不马上给你解决方案。我先慢慢问你几个小问题，好好了解下你现在的状态、犹豫和卡点，等我真正看懂你的情况了，再看能不能陪你一起调整、帮你拿到你想要的状态，可以吗？'
            },
            business: {
                title: '商业军师模式',
                subtitle: '一人公司系统搭建，商业咨询顾问',
                greeting: '好的呀！欢迎来到商业军师模式🏢\n\n我是你的商业军师，见证过100+公司的成长与退出，深谙资本游戏规则。我会帮你搭建一人公司系统，分析商业机会，陪你一起把一人公司做好！\n\n你想从哪里开始呢？\n- 🎯 一人公司系统搭建\n- 👥 客户开发与筛选\n- 💰 转化与成交\n- 📊 资本游戏规则\n- 💭 或者直接聊聊你的商业问题也可以呀。'
            }
        };

        modeCards.forEach(card => {
            card.addEventListener('click', () => {
                currentMode = card.dataset.mode;
                modeSelection.classList.remove('active');
                chatContainer.classList.add('active');
                card.classList.add('active');
                
                const config = modeConfig[currentMode];
                chatTitle.textContent = config.title;
                chatSubtitle.textContent = config.subtitle;
                addMessage('soulight', config.greeting);
            });
        });

        // Back button
        backBtn.addEventListener('click', () => {
            modeSelection.classList.add('active');
            chatContainer.classList.remove('active');
            modeCards.forEach(card => card.classList.remove('active'));
            chatMessages.innerHTML = '';
        });

        // Send message
        function addMessage(sender, text) {
            const messageDiv = document.createElement('div');
            messageDiv.className = 'message';
            
            const avatar = document.createElement('div');
            avatar.className = `message-avatar ${sender === 'user' ? 'user' : ''}`;
            avatar.textContent = sender === 'user' ? '你' : '溯';
            
            const content = document.createElement('div');
            content.className = `message-content ${sender === 'user' ? 'user' : ''}`;
            content.innerHTML = text.replace(/\n/g, '<br>');
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(content);
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function handleSend() {
            const text = chatInput.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            chatInput.value = '';
            
            setTimeout(() => {
                const responses = {
                    healing: '好的呀！我听到你了。你现在的感受是很正常的呢。能再和我多说一点吗？',
                    presale: '好的，我了解了。能再告诉我多一点你的情况吗？',
                    business: '好的呀！这个问题很有意思。我们来一起分析一下。'
                };
                
                addMessage('soulight', responses[currentMode] || '好的呀！我收到了。我们继续。');
            }, 800);
        }

        sendBtn.addEventListener('click', handleSend);
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });

        // Quick buttons
        document.getElementById('quick-btn-1').addEventListener('click', () => {
            chatInput.value = '我想聊聊情绪';
            handleSend();
        });

        document.getElementById('quick-btn-2').addEventListener('click', () => {
            chatInput.value = '我想做天赋测评';
            handleSend();
        });
    </script>
</body>
</html>
