<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真我天赋探索测评</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 { font-size: 1.8em; font-weight: 800; margin-bottom: 8px; }
        .content { padding: 30px 20px; }
        .page { display: none; }
        .page.active { display: block; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-top: 20px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(102,126,234,0.4); }
        h2 { color: #333; margin-bottom: 20px; text-align: center; }
        .intro { color: #555; line-height: 1.8; margin-bottom: 20px; text-align: center; }
        .question {
            background: #fafbff;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 1px solid #e8ecf4;
        }
        .question-text { font-size: 1.1em; font-weight: 600; color: #333; margin-bottom: 15px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option {
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            background: white;
            text-align: left;
        }
        .option:hover { border-color: #667eea; background: #f8f9ff; }
        .option.selected { border-color: #667eea; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .progress {
            background: #f0f0f0;
            height: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        .progress-bar {
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }
        .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn-small { padding: 12px 30px; font-size: 1em; width: auto; }
        .result { background: linear-gradient(135deg, #f8f9ff 0%, #fff0f5 100%); padding: 25px; border-radius: 15px; border-left: 5px solid #667eea; margin: 20px 0; text-align: left; }
        .result h3 { color: #667eea; font-size: 1.4em; margin-bottom: 15px; }
        .result p { color: #555; line-height: 1.7; }
        .type-tag { display: inline-block; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 6px 14px; border-radius: 20px; font-size: 0.85em; margin: 3px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 真我天赋探索测评</h1>
            <p>探索你的内在，找到你的热爱与天赋</p>
        </div>
        <div class="content">
            <!-- 开始页面 -->
            <div id="page1" class="page active">
                <h2>🎯 测试说明</h2>
                <div class="intro">
                    <p>共 30 道题目，预计用时 5-8 分钟</p>
                    <p>请凭第一直觉选择，没有好坏对错</p>
                </div>
                <button id="startBtn" class="btn">🚀 开始测试</button>
            </div>
            
            <!-- 答题页面 -->
            <div id="page2" class="page">
                <div class="progress"><div id="progressBar" class="progress-bar" style="width: 0%"></div></div>
                <div id="questionArea"></div>
                <div class="btn-group">
                    <button id="prevBtn" class="btn btn-small" style="display:none;">⬅️ 上一题</button>
                    <button id="nextBtn" class="btn btn-small">下一题 ➡️</button>
                    <button id="submitBtn" class="btn btn-small" style="display:none;">✨ 查看结果</button>
                </div>
            </div>
            
            <!-- 结果页面 -->
            <div id="page3" class="page">
                <h2>🎉 你的天赋测评结果</h2>
                <div id="resultArea"></div>
                <button id="restartBtn" class="btn">🔄 重新测试</button>
            </div>
        </div>
    </div>
    
    <script>
        console.log('🚀 脚本加载成功');
        
        const questions = [
            { text: '当你需要做决定时，你更倾向于：', options: ['先分析数据和事实', '先感受自己的内心', '先听听别人的建议', '先想象最好的结果'] },
            { text: '在聚会中，你更像是：', options: ['观察别人', '和几个人深入聊天', '和很多人打招呼', '成为焦点'] },
            { text: '你更喜欢的工作方式：', options: ['独立完成', '和一小群人合作', '和很多人一起', '带领团队'] },
            { text: '学习新东西时，你倾向于：', options: ['看书查资料', '听别人讲解', '动手实践', '想象创造'] },
            { text: '你更看重：', options: ['效率结果', '和谐关系', '体验快乐', '愿景成长'] },
            { text: '遇到困难时，你倾向于：', options: ['分析解决', '找人倾诉', '先放一放', '挑战它'] },
            { text: '你更喜欢的环境：', options: ['安静有条理', '温暖有人情味', '热闹有趣', '有挑战性'] },
            { text: '你更擅长：', options: ['分析逻辑', '倾听共情', '动手实践', '想象创造'] },
            { text: '别人常说你：', options: ['很理性', '很温暖', '很有趣', '很有想法'] },
            { text: '你愿意花时间在：', options: ['学习技能', '维护关系', '享受生活', '探索未来'] },
            { text: '开始新项目时，你倾向于：', options: ['先做计划', '先找伙伴', '先动手做', '先想象愿景'] },
            { text: '你更在意：', options: ['有没有用', '会不会伤人', '开不开心', '有没有成长'] },
            { text: '感到压力时，你倾向于：', options: ['自己处理', '找人聊聊', '去放松', '挑战压力'] },
            { text: '你更喜欢的娱乐：', options: ['看书学习', '朋友聚会', '运动旅行', '创作思考'] },
            { text: '你更认同：', options: ['知识就是力量', '爱是一切', '活在当下', '不断成长'] },
            { text: '介绍自己时，你倾向于说：', options: ['技能成就', '性格感受', '爱好体验', '愿景梦想'] },
            { text: '你的金钱观：', options: ['工具实现目标', '安全感', '资源体验', '燃料实现愿景'] },
            { text: '选工作时，你更看重：', options: ['能力成长', '人际环境', '有意思', '挑战愿景'] },
            { text: '你擅长的沟通：', options: ['逻辑清晰', '温暖共情', '有趣幽默', '有感染力'] },
            { text: '你愿意成为：', options: ['专家', '陪伴者', '体验者', '引领者'] },
            { text: '做选择时，你倾向于：', options: ['理性分析', '问内心', '选有趣的', '选有挑战的'] },
            { text: '你更在意：', options: ['对不对', '好不好', '开不开心', '值不值'] },
            { text: '你喜欢的学习方式：', options: ['系统化', '请教别人', '做中学', '顿悟'] },
            { text: '合作时，你倾向于：', options: ['分析执行', '沟通协调', '创意乐趣', '愿景激励'] },
            { text: '你的人生态度：', options: ['精益求精', '和谐共处', '活在当下', '不断突破'] },
            { text: '买东西时，你看重：', options: ['品质实用', '感觉喜欢', '有趣独特', '可能性成长'] },
            { text: '你愿意花时间在：', options: ['实现目标', '维护关系', '体验生活', '探索未来'] },
            { text: '你更擅长：', options: ['解决问题', '理解他人', '创造乐趣', '看到可能'] },
            { text: '迷茫时，你倾向于：', options: ['分析找方向', '找人聊聊', '去体验', '想象未来'] },
            { text: '你更想成为：', options: ['有能力', '有爱心', '有趣', '有愿景'] }
        ];
        
        const typeInfo = {
            A: { name: '专家/建设者', icon: '🏗️', tags: ['理性', '逻辑', '目标', '专业'], desc: '你擅长分析问题、制定计划，用专业能力创造价值' },
            B: { name: '陪伴者/支持者', icon: '🤗', tags: ['感受', '关系', '和谐', '爱'], desc: '你擅长倾听、共情，用温暖和陪伴支持他人' },
            C: { name: '体验者/生活家', icon: '🎉', tags: ['体验', '活力', '快乐', '当下'], desc: '你擅长体验生活、创造乐趣，用活力感染他人' },
            D: { name: '引领者/创造者', icon: '🚀', tags: ['愿景', '可能性', '成长', '创造'], desc: '你擅长看到愿景、激励他人，用创造实现突破' }
        };
        
        let currentQ = 0;
        const answers = {};
        
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }
        
        function renderQuestion() {
            const q = questions[currentQ];
            let html = `
                <div class="question">
                    <div style="color:#667eea; font-weight:700; margin-bottom:10px;">第 ${currentQ + 1} 题 / 共 30 题</div>
                    <div class="question-text">${q.text}</div>
                    <div class="options">
                        ${q.options.map((opt, i) => `
                            <div class="option ${answers[currentQ] === i ? 'selected' : ''}" data-index="${i}">
                                <span style="font-weight:600; margin-right:10px;">${String.fromCharCode(65 + i)}.</span>${opt}
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            document.getElementById('questionArea').innerHTML = html;
            document.getElementById('progressBar').style.width = ((currentQ + 1) / 30 * 100) + '%';
            
            document.getElementById('prevBtn').style.display = currentQ > 0 ? 'inline-block' : 'none';
            document.getElementById('nextBtn').style.display = (currentQ < 29 && answers[currentQ] !== undefined) ? 'inline-block' : 'none';
            document.getElementById('submitBtn').style.display = (currentQ === 29 && answers[currentQ] !== undefined) ? 'inline-block' : 'none';
            
            document.querySelectorAll('.option').forEach(el => {
                el.onclick = function() {
                    answers[currentQ] = parseInt(this.dataset.index);
                    renderQuestion();
                };
            });
        }
        
        function calcResult() {
            const scores = { A:0, B:0, C:0, D:0 };
            for (let i = 0; i < 30; i++) {
                if (answers[i] !== undefined) {
                    const type = String.fromCharCode(65 + answers[i]);
                    scores[type]++;
                }
            }
            const sorted = Object.entries(scores).sort((a,b) => b[1]-a[1]);
            const primary = sorted[0][0];
            const info = typeInfo[primary];
            
            let html = `
                <div class="result">
                    <h3>${info.icon} ${info.name}</h3>
                    <div style="margin:15px 0;">
                        ${info.tags.map(t => `<span class="type-tag">${t}</span>`).join('')}
                    </div>
                    <p style="margin-top:15px; font-size:1.05em;">${info.desc}</p>
                    <p style="margin-top:20px; color:#666;">
                        <strong>得分：</strong><br>
                        ${Object.entries(scores).map(([k,v]) => `${typeInfo[k].icon} ${typeInfo[k].name}: ${v}分`).join(' | ')}
                    </p>
                </div>
            `;
            document.getElementById('resultArea').innerHTML = html;
        }
        
        // 绑定所有按钮事件
        document.getElementById('startBtn').onclick = function() {
            console.log('🖱️ 开始测试按钮点击');
            currentQ = 0;
            Object.keys(answers).forEach(k => delete answers[k]);
            showPage('page2');
            renderQuestion();
        };
        
        document.getElementById('prevBtn').onclick = function() {
            if (currentQ > 0) { currentQ--; renderQuestion(); }
        };
        
        document.getElementById('nextBtn').onclick = function() {
            if (currentQ < 29) { currentQ++; renderQuestion(); }
        };
        
        document.getElementById('submitBtn').onclick = function() {
            if (Object.keys(answers).length < 30) {
                alert('请回答所有问题！');
                return;
            }
            calcResult();
            showPage('page3');
        };
        
        document.getElementById('restartBtn').onclick = function() {
            showPage('page1');
        };
        
        console.log('✅ 所有事件绑定完成');
    </script>
</body>
</html>
