<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真我天赋探索测评</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .content {
            padding: 40px;
        }
        
        .question {
            margin-bottom: 30px;
        }
        
        .question-text {
            font-size: 1.2em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
        }
        
        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }
        
        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .progress {
            background: #f0f0f0;
            height: 6px;
            border-radius: 3px;
            margin-bottom: 30px;
        }
        
        .progress-bar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            border-radius: 3px;
            transition: width 0.3s;
        }
        
        .results {
            display: none;
        }
        
        .result-card {
            background: #f8f9ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        
        .result-card h3 {
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .dimensions {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 30px 0;
        }
        
        .dimension {
            text-align: center;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        
        .dimension-icon {
            font-size: 2em;
            margin-bottom: 10px;
        }
        
        .dimension-name {
            font-weight: 600;
            color: #333;
        }
        
        .dimension-score {
            font-size: 1.5em;
            color: #667eea;
            font-weight: bold;
            margin-top: 5px;
        }
        
        .page {
            display: none;
        }
        
        .page.active {
            display: block;
        }
        
        .start-page {
            text-align: center;
        }
        
        .start-page h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #333;
        }
        
        .start-page .intro {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✨ 真我蜕变 · 天赋探索</h1>
            <p>探索内在 · 构建自己 · 创造财富 · 收获幸福</p>
        </div>
        
        <div class="content">
            <!-- 开始页面 -->
            <div id="startPage" class="page active start-page">
                <h2>🌟 欢迎来到真我蜕变之旅</h2>
                <div class="intro">
                    <p>这不仅是一个测评，更是一次深入的自我探索。</p>
                    <p>通过发现你的天赋优势，构建属于你的财富力、幸福力和事业力。</p>
                    <p>共36道题目，预计用时5-8分钟，请跟随直觉做出选择。</p>
                </div>
                
                <div class="dimensions">
                    <div class="dimension">
                        <div class="dimension-icon">🧠</div>
                        <div class="dimension-name">思维认知</div>
                    </div>
                    <div class="dimension">
                        <div class="dimension-icon">🎨</div>
                        <div class="dimension-name">创意表达</div>
                    </div>
                    <div class="dimension">
                        <div class="dimension-icon">🤝</div>
                        <div class="dimension-name">人际互动</div>
                    </div>
                    <div class="dimension">
                        <div class="dimension-icon">📊</div>
                        <div class="dimension-name">执行规划</div>
                    </div>
                    <div class="dimension">
                        <div class="dimension-icon">🌟</div>
                        <div class="dimension-name">领导力</div>
                    </div>
                    <div class="dimension">
                        <div class="dimension-icon">💪</div>
                        <div class="dimension-name">韧性</div>
                    </div>
                </div>
                
                <button class="btn" onclick="startAssessment()">开始测评</button>
            </div>
            
            <!-- 测评页面 -->
            <div id="quizPage" class="page">
                <div class="progress">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
                <div id="questionsContainer"></div>
                <div style="text-align: center;">
                    <button class="btn" id="prevBtn" onclick="prevPage()" style="display: none;">上一页</button>
                    <button class="btn" id="nextBtn" onclick="nextPage()">下一页</button>
                    <button class="btn" id="submitBtn" onclick="submitAssessment()" style="display: none;">查看结果</button>
                </div>
            </div>
            
            <!-- 结果页面 -->
            <div id="resultsPage" class="page results">
                <h2 style="text-align: center; margin-bottom: 30px; color: #333;">🎉 你的天赋测评结果</h2>
                
                <div class="dimensions" id="resultsDimensions"></div>
                
                <div id="detailedResults"></div>
                
                <div style="text-align: center; margin-top: 30px;">
                    <button class="btn" onclick="restartAssessment()">重新测评</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const questions = [
            // 维度1: 思维认知 (1-6)
            { dimension: 'thinking', text: '我喜欢深入分析复杂的问题', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'thinking', text: '我善于发现事物之间的规律和联系', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'thinking', text: '我喜欢学习新的理论和概念', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'thinking', text: '我善于从多个角度思考问题', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'thinking', text: '我对抽象的想法和概念很感兴趣', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'thinking', text: '我善于逻辑推理和批判性思考', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            
            // 维度2: 创意表达 (7-12)
            { dimension: 'creativity', text: '我经常有新奇的想法', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'creativity', text: '我喜欢用不同的方式表达自己', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'creativity', text: '我善于跳出常规思维框架', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'creativity', text: '我欣赏艺术和美学', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'creativity', text: '我喜欢尝试新的做事方式', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'creativity', text: '我善于将不同的想法组合在一起', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            
            // 维度3: 人际互动 (13-18)
            { dimension: 'social', text: '我善于理解他人的感受', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'social', text: '我喜欢与人交流和建立联系', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'social', text: '我善于倾听和共情', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'social', text: '我能够很好地处理人际冲突', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'social', text: '我喜欢团队合作', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'social', text: '我善于洞察他人的需求', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            
            // 维度4: 执行规划 (19-24)
            { dimension: 'execution', text: '我善于制定详细的计划', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'execution', text: '我喜欢有组织和有条理', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'execution', text: '我能够高效地完成任务', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'execution', text: '我善于设定和达成目标', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'execution', text: '我注重细节和质量', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'execution', text: '我善于时间管理', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            
            // 维度5: 领导力 (25-30)
            { dimension: 'leadership', text: '我善于激励和鼓舞他人', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'leadership', text: '我喜欢承担责任和引领方向', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'leadership', text: '我善于做决策和判断', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'leadership', text: '我有很强的远见和战略思维', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'leadership', text: '我善于培养和发展他人', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'leadership', text: '我在压力下能够保持冷静', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            
            // 维度6: 韧性 (31-36)
            { dimension: 'resilience', text: '面对挫折时我能够快速恢复', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'resilience', text: '我有很强的适应能力', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'resilience', text: '我能够在困难中保持乐观', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'resilience', text: '我不害怕失败，把它看作学习机会', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'resilience', text: '我能够长期坚持追求目标', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] },
            { dimension: 'resilience', text: '我有很强的自我激励能力', options: ['非常不同意', '不同意', '中立', '同意', '非常同意'] }
        ];
        
        const dimensionInfo = {
            thinking: { 
                name: '思维认知', 
                icon: '🧠', 
                description: '你是一个深度思考者，善于分析和理解复杂的概念。',
                careers: ['商业顾问', '战略规划', '投资分析', '学术研究', '产品设计'],
                wealthTips: '利用你的分析能力，找到市场规律和商业机会',
                happinessTips: '通过深度思考获得洞见，这会给你带来深层的满足感'
            },
            creativity: { 
                name: '创意表达', 
                icon: '🎨', 
                description: '你富有创造力，善于用新颖的方式看待世界。',
                careers: ['内容创作', '品牌营销', '设计创意', '艺术表演', '创新产品'],
                wealthTips: '将创意转化为有价值的产品或服务，打造个人品牌',
                happinessTips: '持续创作和表达，让你的天赋得到充分发挥'
            },
            social: { 
                name: '人际互动', 
                icon: '🤝', 
                description: '你善于与人连接，具有出色的同理心和社交能力。',
                careers: ['心理咨询', '教育培训', '销售运营', '社群运营', '人力资源'],
                wealthTips: '通过帮助他人获得回报，建立长期信任关系',
                happinessTips: '在人际连接中获得能量，感受到自己的价值'
            },
            execution: { 
                name: '执行规划', 
                icon: '📊', 
                description: '你是一个高效的执行者，善于计划和完成任务。',
                careers: ['项目管理', '运营管理', '财务管理', '流程优化', '质量控制'],
                wealthTips: '通过高效执行和系统化管理，创造稳定的收入来源',
                happinessTips: '在有序和可控的环境中工作，达成目标会给你带来成就感'
            },
            leadership: { 
                name: '领导力', 
                icon: '🌟', 
                description: '你具有天生的领导才能，能够激励和引领他人。',
                careers: ['创业', '企业管理', '团队领导', '投资孵化', '社会活动'],
                wealthTips: '通过整合资源和带领团队，创造更大的价值和回报',
                happinessTips: '在引领他人成长的过程中，获得深层的意义感'
            },
            resilience: { 
                name: '韧性', 
                icon: '💪', 
                description: '你内心强大，能够在逆境中茁壮成长。',
                careers: ['创业', '销售', '风险投资', '极限运动', '变革管理'],
                wealthTips: '利用你的坚韧品质，在高风险高回报的领域脱颖而出',
                happinessTips: '在克服挑战的过程中，感受到自己的成长和强大'
            }
        };
        
        const answers = {};
        let currentPage = 0;
        const questionsPerPage = 6;
        const totalPages = Math.ceil(questions.length / questionsPerPage);
        
        function startAssessment() {
            document.getElementById('startPage').classList.remove('active');
            document.getElementById('quizPage').classList.add('active');
            renderQuestions();
        }
        
        function renderQuestions() {
            const container = document.getElementById('questionsContainer');
            const startIndex = currentPage * questionsPerPage;
            const endIndex = Math.min(startIndex + questionsPerPage, questions.length);
            
            let html = '';
            for (let i = startIndex; i < endIndex; i++) {
                const q = questions[i];
                html += `
                    <div class="question">
                        <div class="question-text">${i + 1}. ${q.text}</div>
                        <div class="options">
                            ${q.options.map((opt, j) => `
                                <div class="option ${answers[i] === j ? 'selected' : ''}" 
                                     onclick="selectOption(${i}, ${j})">${opt}</div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            container.innerHTML = html;
            updateProgress();
            updateButtons();
        }
        
        function selectOption(questionIndex, optionIndex) {
            answers[questionIndex] = optionIndex;
            renderQuestions();
        }
        
        function updateProgress() {
            const progress = (Object.keys(answers).length / questions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }
        
        function updateButtons() {
            document.getElementById('prevBtn').style.display = currentPage > 0 ? 'inline-block' : 'none';
            document.getElementById('nextBtn').style.display = currentPage < totalPages - 1 ? 'inline-block' : 'none';
            document.getElementById('submitBtn').style.display = currentPage === totalPages - 1 ? 'inline-block' : 'none';
        }
        
        function nextPage() {
            if (currentPage < totalPages - 1) {
                currentPage++;
                renderQuestions();
            }
        }
        
        function prevPage() {
            if (currentPage > 0) {
                currentPage--;
                renderQuestions();
            }
        }
        
        function submitAssessment() {
            if (Object.keys(answers).length < questions.length) {
                alert('请回答所有问题后再提交！');
                return;
            }
            
            calculateResults();
        }
        
        function calculateResults() {
            const scores = {
                thinking: 0,
                creativity: 0,
                social: 0,
                execution: 0,
                leadership: 0,
                resilience: 0
            };
            
            questions.forEach((q, i) => {
                scores[q.dimension] += (answers[i] + 1); // 1-5分
            });
            
            // 显示结果
            document.getElementById('quizPage').classList.remove('active');
            document.getElementById('resultsPage').classList.add('active');
            
            // 显示维度分数
            let dimHtml = '';
            for (const [key, info] of Object.entries(dimensionInfo)) {
                const maxScore = 30; // 6题 × 5分
                const percentage = Math.round((scores[key] / maxScore) * 100);
                dimHtml += `
                    <div class="dimension">
                        <div class="dimension-icon">${info.icon}</div>
                        <div class="dimension-name">${info.name}</div>
                        <div class="dimension-score">${percentage}%</div>
                    </div>
                `;
            }
            document.getElementById('resultsDimensions').innerHTML = dimHtml;
            
            // 找出最高维度
            let maxScore = 0;
            let maxDimension = '';
            for (const [key, score] of Object.entries(scores)) {
                if (score > maxScore) {
                    maxScore = score;
                    maxDimension = key;
                }
            }
            
            // 详细结果
            let detailHtml = `
                <div class="result-card">
                    <h3>🏆 你的核心天赋：${dimensionInfo[maxDimension].icon} ${dimensionInfo[maxDimension].name}</h3>
                    <p>${dimensionInfo[maxDimension].description}</p>
                </div>
                
                <div class="result-card">
                    <h3>💎 天赋变现指南</h3>
                    <p style="color: #666; margin-bottom: 15px;">基于你的核心天赋，以下是一些可能的发展方向：</p>
                    <div id="talentCareerTips"></div>
                </div>
                
                <div class="result-card">
                    <h3>📊 各维度详细解析</h3>
            `;
            
            for (const [key, info] of Object.entries(dimensionInfo)) {
                const maxScore = 30;
                const percentage = Math.round((scores[key] / maxScore) * 100);
                let level = '';
                if (percentage >= 80) level = '🌟 卓越';
                else if (percentage >= 60) level = '👍 优秀';
                else if (percentage >= 40) level = '📈 发展中';
                else level = '💡 待探索';
                
                detailHtml += `
                    <div style="margin: 15px 0; padding: 15px; background: white; border-radius: 8px;">
                        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                            <strong>${info.icon} ${info.name}</strong>
                            <span>${level}</span>
                        </div>
                        <div style="background: #f0f0f0; height: 10px; border-radius: 5px;">
                            <div style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); width: ${percentage}%; height: 100%; border-radius: 5px;"></div>
                        </div>
                    </div>
                `;
            }
            
            detailHtml += '</div>';
            
            // 动态插入职业建议
            setTimeout(() => {
                const tipsContainer = document.getElementById('talentCareerTips');
                if (tipsContainer && dimensionInfo[maxDimension]) {
                    const info = dimensionInfo[maxDimension];
                    tipsContainer.innerHTML = `
                        <div style="margin: 10px 0;">
                            <strong>🎯 适合的方向：</strong>
                            <div style="color: #666; margin-top: 8px; line-height: 1.8;">
                                ${info.careers.map(c => `<span style="display: inline-block; background: #f0f0f0; padding: 4px 12px; border-radius: 15px; margin: 4px; font-size: 0.9em;">${c}</span>`).join('')}
                            </div>
                        </div>
                        <div style="margin: 15px 0;">
                            <strong>💰 财富力建议：</strong>
                            <p style="color: #666; margin-top: 8px;">${info.wealthTips}</p>
                        </div>
                        <div style="margin: 15px 0;">
                            <strong>😊 幸福力建议：</strong>
                            <p style="color: #666; margin-top: 8px;">${info.happinessTips}</p>
                        </div>
                    `;
                }
            }, 100);
            
            // 发展建议
            detailHtml += `
                <div class="result-card">
                    <h3>🚀 发展建议</h3>
                    <ul style="line-height: 2; color: #666;">
                        <li>聚焦发挥你的核心天赋，在相关领域寻找机会</li>
                        <li>有意识地发展"发展中"和"待探索"的维度</li>
                        <li>与他人合作，互补彼此的优势</li>
                        <li>定期回顾，持续探索和发现自己</li>
                    </ul>
                </div>
            `;
            
            document.getElementById('detailedResults').innerHTML = detailHtml;
        }
        
        function restartAssessment() {
            Object.keys(answers).forEach(key => delete answers[key]);
            currentPage = 0;
            document.getElementById('resultsPage').classList.remove('active');
            document.getElementById('startPage').classList.add('active');
        }
    </script>
</body>
</html>
