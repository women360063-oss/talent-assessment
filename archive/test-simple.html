<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单测试</title>
    <style>
        body { font-family: Arial; padding: 20px; text-align: center; }
        .btn { background: #667eea; color: white; padding: 15px 40px; border: none; border-radius: 30px; font-size: 1.2em; cursor: pointer; margin: 20px; }
        .page { display: none; padding: 20px; border: 2px solid #667eea; border-radius: 20px; margin: 20px 0; }
        .page.active { display: block; }
    </style>
</head>
<body>
    <h1>🔧 简单测试</h1>
    
    <div id="page1" class="page active">
        <h2>这是第1页</h2>
        <button class="btn" onclick="goToPage2()">点击跳转第2页</button>
    </div>
    
    <div id="page2" class="page">
        <h2>🎉 成功跳转到第2页了！</h2>
        <button class="btn" onclick="goToPage1()">返回第1页</button>
    </div>
    
    <script>
        function goToPage2() {
            console.log('goToPage2 called!');
            document.getElementById('page1').classList.remove('active');
            document.getElementById('page2').classList.add('active');
            console.log('done!');
        }
        function goToPage1() {
            console.log('goToPage1 called!');
            document.getElementById('page2').classList.remove('active');
            document.getElementById('page1').classList.add('active');
        }
        
        console.log('✅ 简单测试脚本加载成功');
    </script>
</body>
</html>
