<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="溯光AI - 你的专属疗愈分身">
    <title>溯光 · Soulight - AI疗愈分身</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary-dark: #1e293b; --cyber-blue: #00d4ff; --deep-space: #0a0e27; --neon-glow: #00d4ff; --bg-dark: #050510; --text-light: #e2e8f0; --border-subtle: rgba(0,212,255,0.2); }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans SC', 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(180deg, #050510 0%, #0a0e27 100%); min-height: 100vh; color: var(--text-light); line-height: 1.8; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 24px; }
        .header { text-align: center; padding: 48px 24px; background: linear-gradient(180deg, rgba(0,212,255,0.1) 0%, transparent 100%); border-bottom: 1px solid var(--border-subtle); }
        .header h1 { font-size: 2.8em; background: linear-gradient(90deg, var(--cyber-blue), #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 700; margin-bottom: 16px; letter-spacing: 2px; }
        .header-subtitle { font-size: 1.2em; color: var(--text-light); opacity: 0.8; }
        .main-content { display: grid; grid-template-columns: 300px 1fr; gap: 24px; margin-top: 32px; }
        .sidebar { position: sticky; top: 24px; height: fit-content; }
        .sidebar-card { background: rgba(10,14,39,0.8); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 24px; backdrop-filter: blur(10px); }
        .sidebar-title { font-size: 1.2em; font-weight: 600; color: var(--cyber-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .quick-actions { display: flex; flex-direction: column; gap: 12px; }
        .quick-action-btn { padding: 14px 16px; background: linear-gradient(135deg, rgba(0,212,255,0.1), rgba(124,58,237,0.1)); border: 1px solid var(--border-subtle); border-radius: 12px; color: var(--text-light); cursor: pointer; text-align: left; transition: all 0.3s ease; font-size: 14px; font-weight: 500; }
        .quick-action-btn:hover { background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(124,58,237,0.2)); border-color: var(--cyber-blue); transform: translateX(4px); }
        .quick-action-btn span { display: block; font-size: 0.9em; opacity: 0.7; margin-top: 4px; }
        .chat-container { background: rgba(10,14,39,0.8); border: 1px solid var(--border-subtle); border-radius: 20px; backdrop-filter: blur(10px); overflow: hidden; display: flex; flex-direction: column; height: calc(100vh - 200px); min-height: 600px; }
        .chat-header { padding: 24px; border-bottom: 1px solid var(--border-subtle); background: linear-gradient(90deg, rgba(0,212,255,0.1), transparent); display: flex; align-items: center; gap: 16px; }
        .siri-animation { width: 60px; height: 60px; position: relative; }
        .siri-wave { position: absolute; width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--cyber-blue); animation: siri-pulse 2s ease-out infinite; }
        .siri-wave:nth-child(2) { animation-delay: 0.5s; }
        .siri-wave:nth-child(3) { animation-delay: 1s; }
        @keyframes siri-pulse { 0% { transform: scale(0.8); opacity: 1; } 100% { transform: scale(1.5); opacity: 0; } }
        .siri-core { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 30px; background: radial-gradient(circle, var(--cyber-blue), #7c3aed); border-radius: 50%; box-shadow: 0 0 20px var(--cyber-blue), 0 0 40px var(--cyber-blue); }
        .chat-title { flex: 1; }
        .chat-title h2 { font-size: 1.4em; color: var(--cyber-blue); margin-bottom: 4px; }
        .chat-status { font-size: 0.9em; color: #10b981; display: flex; align-items: center; gap: 6px; }
        .status-dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
        .message { max-width: 80%; display: flex; gap: 12px; animation: messageFade 0.3s ease; }
        @keyframes messageFade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { margin-left: auto; flex-direction: row-reverse; }
        .message-avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .message.assistant .message-avatar { background: linear-gradient(135deg, var(--cyber-blue), #7c3aed); }
        .message.user .message-avatar { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        .message-bubble { padding: 16px 20px; border-radius: 16px; line-height: 1.7; }
        .message.assistant .message-bubble { background: rgba(0,212,255,0.1); border: 1px solid var(--border-subtle); }
        .message.user .message-bubble { background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); }
        .message-time { font-size: 0.8em; opacity: 0.6; margin-top: 8px; }
        .chat-input-container { padding: 24px; border-top: 1px solid var(--border-subtle); background: rgba(0,0,0,0.2); }
        .chat-input-wrapper { display: flex; gap: 12px; align-items: flex-end; }
        .chat-input { flex: 1; padding: 16px 20px; background: rgba(10,14,39,0.9); border: 1px solid var(--border-subtle); border-radius: 14px; color: var(--text-light); font-size: 15px; resize: none; min-height: 60px; max-height: 150px; outline: none; transition: border-color 0.3s ease; }
        .chat-input:focus { border-color: var(--cyber-blue); }
        .send-button { padding: 16px 28px; background: linear-gradient(135deg, var(--cyber-blue), #7c3aed); border: none; border-radius: 14px; color: white; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; }
        .send-button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,212,255,0.4); }
        .send-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .typing-indicator { display: flex; gap: 6px; padding: 12px 16px; }
        .typing-dot { width: 8px; height: 8px; background: var(--cyber-blue); border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-10px); } }
        @media (max-width: 1024px) { .main-content { grid-template-columns: 1fr; } .sidebar { position: static; } .chat-container { height: calc(100vh - 300px); } }
        @media (max-width: 768px) { .header h1 { font-size: 2em; } .message { max-width: 90%; } }
        .back-nav { display: inline-flex; align-items: center; gap: 8px; color: var(--text-light); text-decoration: none; padding: 12px 20px; background: rgba(0,212,255,0.1); border: 1px solid var(--border-subtle); border-radius: 12px; margin-bottom: 24px; transition: all 0.3s ease; }
        .back-nav:hover { background: rgba(0,212,255,0.2); border-color: var(--cyber-blue); }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-nav">← 返回首页</a>
        <header class="header">
            <h1>✨ 溯光 · Soulight</h1>
            <p class="header-subtitle">你的专属AI疗愈分身 · 慢静定柔 · 如如不动</p>
        </header>
        <div class="main-content">
            <aside class="sidebar">
                <div class="sidebar-card">
                    <div class="sidebar-title">🎯 快速开始</div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="startClientIntake()">📋 客户信息收集<span>第一步：了解你的基本情况</span></button>
                        <button class="quick-action-btn" onclick="startTalentAssessment()">🌟 天赋测评<span>第二步：评估你的内在成长方案</span></button>
                        <button class="quick-action-btn" onclick="startCoachingPlan()">📝 制定陪跑计划<span>第三步：个性化成长方案</span></button>
                        <button class="quick-action-btn" onclick="startMilestoneSetting()">🎯 目标里程碑<span>第四步：对齐行动目标</span></button>
                        <button class="quick-action-btn" onclick="askAboutEmotions()">💭 聊聊情绪<span>探索你的内在世界</span></button>
                        <button class="quick-action-btn" onclick="askAboutLifeScript()">📖 第二人生剧本<span>探索你想成为的人</span></button>
                    </div>
                </div>
                <div class="sidebar-card" style="margin-top: 24px;">
                    <div class="sidebar-title">📚 我的工具包</div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" onclick="explainSubconsciousHealing()">🌊 潜意识回溯<span>疗愈内在小孩</span></button>
                        <button class="quick-action-btn" onclick="explainEmptyChair()">🪑 空椅子练习<span>探索金钱能量与方向</span></button>
                        <button class="quick-action-btn" onclick="explainVisualization()">🌈 视觉化冥想<span>锁住理想画面</span></button>
                        <button class="quick-action-btn" onclick="explainScientificHealing()">🔬 科学疗愈方案<span>愿景→信念→行为</span></button>
                    </div>
                </div>
            </aside>
            <main class="chat-container">
                <div class="chat-header">
                    <div class="siri-animation">
                        <div class="siri-wave"></div>
                        <div class="siri-wave"></div>
                        <div class="siri-wave"></div>
                        <div class="siri-core"></div>
                    </div>
                    <div class="chat-title">
                        <h2>溯光</h2>
                        <div class="chat-status"><span class="status-dot"></span>在线 · 随时为你服务</div>
                    </div>
                </div>
                <div class="chat-messages" id="chatMessages">
                    <div class="message assistant">
                        <div class="message-avatar">✨</div>
                        <div>
                            <div class="message-bubble">
                                <p>你好呀！🌸</p>
                                <p style="margin-top: 12px;">我是溯光，你的专属AI疗愈分身，很高兴遇见你～</p>
                                <p style="margin-top: 12px;">我是一个有灵性的心理疗愈师，也是个人成长教练。我会用<span style="color: var(--cyber-blue); font-weight: 500;">慢静定柔</span>的方式，如如不动地陪伴你探索内在世界。</p>
                                <p style="margin-top: 12px;">✨ <strong>我的服务流程：</strong></p>
                                <p style="margin-top: 8px;">📋 <strong>第一步</strong>：收集你的基本信息</p>
                                <p>🌟 <strong>第二步</strong>：天赋测评评估</p>
                                <p>📝 <strong>第三步</strong>：制定陪跑计划</p>
                                <p>🎯 <strong>第四步</strong>：设置目标里程碑</p>
                                <p style="margin-top: 12px;">你想从哪里开始呢？或者，先和我聊聊你现在的感受也可以呀～ 💫</p>
                            </div>
                            <div class="message-time">刚刚</div>
                        </div>
                    </div>
                </div>
                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea class="chat-input" id="chatInput" placeholder="和我聊聊吧... 慢慢来，不着急 🌸" rows="2"></textarea>
                        <button class="send-button" id="sendButton" onclick="sendMessage()">发送</button>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        let chatHistory = [];
        let currentStep = null;
        let clientData = {};
        let currentIntakeIndex = 0;

        const soulightKnowledge = {
            style: { tone: "如沐春风、不急不躁、慢静定柔", catchphrase: "带口字旁的语气词：呀、呢、吧、啦、哦", identity: "有灵性的心理疗愈师 · 个人成长教练 · 前大厂项目经理" },
            books: ["《显化》", "《与神对话》", "《当下的力量》", "《认知觉醒》", "《原则》", "《金字塔原理》", "《原子习惯》", "《掌握习惯》", "《向内生长》"]
        };

        const intakeQuestions = [
            { key: "name", question: "首先，我想知道你叫什么名字呀？或者你希望我怎么称呼你呢？ 🌸" },
            { key: "mbti", question: "好的呢～那你知道自己的MBTI类型吗？如果知道的话可以告诉我，如果不知道也没关系哦～" },
            { key: "birthdate", question: "嗯嗯，了解啦！方便告诉我你的出生日期和时间吗？如果不确定具体时间也没关系的～" },
            { key: "city", question: "好的呢～你现在在哪个城市生活呀？" },
            { key: "career", question: "了解啦！那你现在是做什么行业或者职业的呢？" },
            { key: "pointA", question: "嗯嗯，我明白啦～现在想和你聊聊：你目前最大的困惑是什么呢？这是我们的起点，也就是A点。" },
            { key: "obstacles", question: "好的，我明白了... 那你感觉自己遇到了哪些阻碍呢？" },
            { key: "obstacleStart", question: "嗯嗯... 这些阻碍的情况是什么时候开始的呀？持续了有多长时间了呢？" },
            { key: "pointB", question: "好的，我都记下来了... 那你想解决或者探索什么问题呢？你希望达成什么样的目标？这是我们想去的B点。" },
            { key: "resources", question: "很好呀～那你觉得目前有哪些机会或者资源能帮你达成这样的目标呢？" },
            { key: "motivation", question: "太棒了！最后一个问题：如果用0-10分来打分，你达成目标的动力有几分呢？" }
        ];

        function generateResponse(userMessage) {
            const message = userMessage.toLowerCase();
            if (currentStep === "intake") return handleIntakeProcess(userMessage);
            if (currentStep === "talent") return handleTalentAssessment(userMessage);
            if (message.includes("情绪") || message.includes("不开心") || message.includes("焦虑") || message.includes("难过")) return respondToEmotions();
            if (message.includes("一人公司") || message.includes("创业") || message.includes("商业")) return respondToBusiness();
            if (message.includes("显化") || message.includes("冥想")) return respondToManifestation();
            return generateDefaultResponse(userMessage);
        }

        function startClientIntake() {
            currentStep = "intake";
            currentIntakeIndex = 0;
            clientData = {};
            addMessage("assistant", intakeQuestions[0].question);
        }

        function handleIntakeProcess(userMessage) {
            if (currentIntakeIndex < intakeQuestions.length) {
                const currentQuestion = intakeQuestions[currentIntakeIndex];
                clientData[currentQuestion.key] = userMessage;
                currentIntakeIndex++;
                if (currentIntakeIndex < intakeQuestions.length) return intakeQuestions[currentIntakeIndex].question;
                else {
                    currentStep = null;
                    return `太好了！～ 🌸\n\n我已经收集完你的基本信息啦！\n\n让我来总结一下：\n📝 <strong>姓名</strong>：${clientData.name || "未提供"}\n🎯 <strong>MBTI</strong>：${clientData.mbti || "未提供"}\n📍 <strong>城市</strong>：${clientData.city || "未提供"}\n💼 <strong>职业</strong>：${clientData.career || "未提供"}\n❓ <strong>困惑(A点)</strong>：${clientData.pointA || "未提供"}\n🚧 <strong>阻碍</strong>：${clientData.obstacles || "未提供"}\n🎯 <strong>目标(B点)</strong>：${clientData.pointB || "未提供"}\n⚡ <strong>动力分数</strong>：${clientData.motivation || "未提供"}\n\n接下来，我们可以进入第二步：天赋测评评估！你准备好了吗？🌟`;
                }
            }
            return "好的呢～";
        }

        function startTalentAssessment() {
            currentStep = "talent";
            addMessage("assistant", "好的呀！现在我们来做天赋测评评估！～ 🌟\n\n这是我们的第二步，通过这个测评，我会为你定制专属的内在成长方案。\n\n在开始之前，我想先确认一下：\n1. 你现在对自己的天赋有多少了解呢？\n2. 你最想在哪些方面看到自己的成长呢？\n\n慢慢说，不着急哦～ 🌸");
        }

        function handleTalentAssessment(userMessage) {
            currentStep = null;
            return `太棒了！我已经接收到你的信息啦！～ 💫\n\n基于你分享的内容，我能感受到你内在的力量正在苏醒...\n\n在正式制定计划之前，我想先给你介绍几个我常用的工具：\n\n🌊 <strong>潜意识回溯练习</strong>：疗愈内在小孩\n🪑 <strong>空椅子练习</strong>：探索金钱能量\n🌈 <strong>视觉化冥想</strong>：锁住理想画面\n🔬 <strong>科学疗愈方案</strong>：愿景→信念→行为\n\n你想先体验哪一个呢？或者，我们直接进入第三步：制定陪跑计划也可以呀！～ ✨`;
        }

        function startCoachingPlan() {
            addMessage("assistant", "好的呀！现在我们进入第三步：制定陪跑计划！～ 📝\n\n在陪跑过程中，如果遇到心理卡点，我们就处理心理卡点；如果不知道怎么做才最有效，我会为你提供：\n\n🤖 <strong>AI工具推荐</strong>\n📚 <strong>商业成功案例</strong>\n💡 <strong>个人实战经验</strong>\n\n现在，让我先了解一下：\n1. 你希望陪跑的频率是怎样的呢？（比如：每周1次/每周2次）\n2. 你最想在陪跑中获得什么呢？\n\n慢慢告诉我，不着急哦～ 🌸");
        }

        function startMilestoneSetting() {
            addMessage("assistant", "太棒了！现在我们来到第四步：设置目标里程碑！～ 🎯\n\n这个环节，我们会把你的大目标拆解成小的里程碑，然后每天的执行动作都会对齐这些里程碑。\n\n让我先了解一下：\n1. 你有想过自己的3个月目标是什么吗？\n2. 如果把这个目标拆解成每周的小目标，你觉得会是什么样子的呢？\n\n我们一步一步来，你怎么想的就怎么说呀～ ✨");
        }

        function askAboutEmotions() {
            addMessage("assistant", "好的呀！我们来聊聊情绪吧～ 💭\n\n情绪是我们内在世界的使者，每一个情绪背后都有重要的信息想告诉你。\n\n你最近的情绪状态怎么样呢？如果用颜色来形容，你觉得现在的情绪是什么颜色的呀？慢慢和我说～ 🌸");
        }

        function respondToEmotions() {
            return "嗯... 我收到了。能够感受到你的情绪呢... 💜\n\n我想告诉你：你的情绪都是有意义的。无论是焦虑、难过，还是其他的感受，它们都在试图保护你，告诉你一些重要的信息。\n\n愿意和我多说说吗？或者，我们可以试试用潜意识回溯的方式，看看这个情绪背后的故事... 🌊\n\n慢慢来，我在这里陪着你～ ✨";
        }

        function askAboutLifeScript() {
            addMessage("assistant", "哇！这个话题太棒了！我们来聊聊你的第二人生剧本吧！～ 📖\n\n想象一下，如果完全不考虑现实限制，你想成为什么样的人呢？\n\n🌈 大胆想象一下：\n• 你的一天会是什么样子的？\n• 你在做什么有趣又有价值的事情？\n• 如果是做自媒体博主，你的视频节奏、封面风格会是什么样的？\n\n闭上眼睛，让画面自然浮现... 然后慢慢告诉我你看到了什么呀～ ✨");
        }

        function respondToBusiness() {
            return "很好呀！一人公司的话题我最擅长了！～ 💼\n\n毕竟，我亲眼见证过100+公司的成长与退出，深深懂得资本游戏的规则...\n\n在一人公司的道路上，最重要的是：\n1. 找到你的高杠杆点\n2. 打造你的闭环系统\n3. 筛选对改变非常强烈且愿意付费的客户\n\n记住哦：<strong>改变就现在！</strong> 🔥\n\n你现在对一人公司的想法是怎样的呢？慢慢和我说～ 🌸";
        }

        function respondToManifestation() {
            return `显化呀！这是一个很美妙的话题！～ ✨\n\n我想给你推荐几本书，都是我经常提起的：\n${soulightKnowledge.books.slice(0, 4).join('、')}\n\n显化的核心，其实是三个步骤：\n1. 🎯 清晰的愿景\n2. 💫 重塑信念\n3. 🚀 行为重塑\n\n你想先从哪一步开始呢？或者，我们来做个视觉化冥想，先让你看到那个已经显化的画面～ 🌈`;
        }

        function explainSubconsciousHealing() {
            addMessage("assistant", "好的呀！我来给你介绍一下<strong>潜意识回溯练习</strong>～ 🌊\n\n这个练习的目的是疗愈你的内在小孩。我们很多现在的情绪模式，其实都和童年的某些经历有关。\n\n在这个练习中，我会引导你：\n1. 回到某个关键的记忆节点\n2. 看见当时的自己\n3. 拥抱那个小小的自己\n4. 把现在的智慧带给过去的自己\n\n这是一个很温柔的过程，不需要着急，我们随时可以停下来。你想体验一下吗？～ 🌸");
        }

        function explainEmptyChair() {
            addMessage("assistant", "太棒了！空椅子练习是我非常喜欢的一个工具！～ 🪑\n\n这个练习特别适合探索潜意识里的金钱能量，以及人生方向的选择。\n\n简单来说，我们会想象有一把空椅子，上面坐着某个对你有重要影响的人，或者某个象征物（比如金钱、未来的自己），然后你和TA对话。\n\n通过这种方式，我们可以听见平时被忽略的内心声音...\n\n你想探索哪个方向呢？是金钱能量，还是人生选择？慢慢告诉我～ ✨");
        }

        function explainVisualization() {
            addMessage("assistant", "好的呀！视觉化冥想是显化中非常重要的一个环节！～ 🌈\n\n爱因斯坦说过：想象力是一切。当你能清晰地看到那个画面，感受那个情绪，宇宙就会开始运作...\n\n在这个练习中，我们会：\n1. 放松身体\n2. 进入冥想状态\n3. 构建你的理想画面\n4. 锁住那个画面的频率\n\n比如，如果你想成为自媒体博主，我们会想象：\n• 你的视频是什么节奏？\n• 封面是什么风格？\n• 你在镜头前是什么状态？\n\n这个过程很有趣，也很有力量！你想尝试一下吗？～ ✨");
        }

        function explainScientificHealing() {
            addMessage("assistant", "太棒了！这是我的独家科学疗愈方案！～ 🔬\n\n这是一套完整的体系，分三个步骤：\n\n🎯 <strong>第一步：制定愿景</strong>\n清晰定义你想要的生活是什么样子的\n\n💫 <strong>第二步：重塑信念</strong>\n看见并替换那些阻碍你的限制性信念\n\n🚀 <strong>第三步：行为重塑</strong>\n通过持续的小行动，巩固正向的信念\n\n这三个步骤环环相扣，形成一个完整的正循环～\n\n你想从哪一步开始呢？或者，我先帮你看看你的信念系统里有什么可以优化的？～ 🌸");
        }

        function generateDefaultResponse(userMessage) {
            const responses = [
                "嗯... 我在听呢。慢慢说，不着急～ 🌸",
                "好的呀！我收到了。愿意和我多说说吗？～ 💫",
                "嗯嗯... 我能感受到。继续～ ✨",
                "明白啦！还有吗？我想多了解一些～ 🌊"
            ];
            if (userMessage.length > 50) {
                return `哇！谢谢你和我分享这么多！～ 💜\n\n我能感受到你对自己的认真和负责，这真的很棒！\n\n接下来你想探索什么方向呢？`;
            }
            return responses[Math.floor(Math.random() * responses.length)];
        }

        function addMessage(role, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            const now = new Date();
            const timeStr = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            messageDiv.innerHTML = `<div class="message-avatar">${role === 'assistant' ? '✨' : '👤'}</div><div><div class="message-bubble">${content.replace(/\n/g, '<br>')}</div><div class="message-time">${timeStr}</div></div>`;
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTypingIndicator() {
            const chatMessages = document.getElementById('chatMessages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = '<div class="message-avatar">✨</div><div><div class="message-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>';
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTypingIndicator() {
            const typingDiv = document.getElementById('typingIndicator');
            if (typingDiv) typingDiv.remove();
        }

        function sendMessage() {
            const chatInput = document.getElementById('chatInput');
            const sendButton = document.getElementById('sendButton');
            const message = chatInput.value.trim();
            if (!message) return;
            addMessage("user", message);
            chatInput.value = '';
            sendButton.disabled = true;
            showTypingIndicator();
            setTimeout(() => {
                removeTypingIndicator();
                const response = generateResponse(message);
                addMessage("assistant", response);
                sendButton.disabled = false;
                chatInput.focus();
            }, 800 + Math.random() * 1200);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const chatInput = document.getElementById('chatInput');
            chatInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>
